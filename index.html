<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header>
    <h1>💰 Money Manager</h1>
    <div id="balance">0 ₫</div>
  </header>

  <!-- INPUT -->
  <div class="card">

    <div class="amount-box">
      <input id="amount" type="text" placeholder="0" inputmode="numeric">
      <span class="currency">₫</span>
    </div>

    <div class="quick-amount">
      <button onclick="setQuickAmount(50000)">50K</button>
      <button onclick="setQuickAmount(100000)">100K</button>
      <button onclick="setQuickAmount(500000)">500K</button>
      <button onclick="setQuickAmount(1000000)">1TR</button>
    </div>

    <input id="note" placeholder="Ghi chú...">

    <select id="category">
      <option value="food">🍜 Ăn uống</option>
      <option value="transport">🚗 Di chuyển</option>
      <option value="entertainment">🎮 Giải trí</option>
      <option value="shopping">🛍️ Mua sắm</option>
      <option value="bill">💡 Hóa đơn</option>
      <option value="salary">💼 Lương</option>
      <option value="overtime">⏱️ Làm ngoài giờ</option>
    </select>

    <div class="row">
      <button class="income" onclick="addTransaction('income')">+ Thu</button>
      <button class="expense" onclick="addTransaction('expense')">- Chi</button>
    </div>

  </div>

  <!-- NAV -->
  <div class="card nav" onclick="showView('home')">🏠 Trang chính</div>
  <div class="card nav" onclick="showView('budget')">📊 Thống kê</div>
  <div class="card nav" onclick="showView('history')">📋 Giao dịch</div>

  <!-- HOME -->
  <div id="homeSection">
    <div class="card">
      <strong>📋 Giao dịch gần đây</strong>
      <div id="transactions"></div>
    </div>
  </div>

  <!-- BUDGET -->
  <div id="budgetSection" style="display:none;">
    <div class="card">
      <strong>📊 Tổng quan tháng</strong>
      <div id="budgetBox"></div>
      <canvas id="expenseChart"></canvas>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="historySection" style="display:none;">
    <div class="card">
      <strong>📜 Lịch sử giao dịch</strong>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- RESET CARD -->
  <div class="card reset-card">
    <strong>⚙️ Cài đặt</strong>
    <button onclick="resetMonth()">🗓️ Reset tháng</button>
    <button onclick="resetApp()">🔄 Reset toàn bộ</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
