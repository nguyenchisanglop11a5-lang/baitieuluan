<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Manager Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<!-- LOGIN -->
<div id="authBox" class="card">

  <h3>🔐 Đăng nhập</h3>

  <div id="loginForm">
    <input id="loginUser" placeholder="Tài khoản">

    <div style="display:flex;gap:5px;">
      <input id="loginPass" type="password" placeholder="Mật khẩu">
      <button onclick="togglePassword('loginPass')">👁</button>
    </div>

    <button onclick="login()">Đăng nhập</button>
    <p>Chưa có? <a onclick="showRegister()">Đăng ký</a></p>
  </div>

  <div id="registerForm" style="display:none">
    <input id="regUser" placeholder="Tài khoản">

    <div style="display:flex;gap:5px;">
      <input id="regPass" type="password">
      <button onclick="togglePassword('regPass')">👁</button>
    </div>

    <div style="display:flex;gap:5px;">
      <input id="regPass2" type="password">
      <button onclick="togglePassword('regPass2')">👁</button>
    </div>

    <button onclick="register()">Đăng ký</button>
    <p>Đã có? <a onclick="showLogin()">Đăng nhập</a></p>
  </div>

</div>

<!-- APP -->
<div id="appSection" style="display:none;">

<header>
  <h1>💰 QUẢN LÍ CHI TIÊU</h1>
  <div id="balance">0 ₫</div>
</header>

<!-- INPUT -->
<div class="card">
  <div class="amount-box">
    <input id="amount" type="text" placeholder="0">
    <span class="currency">₫</span>
  </div>

  <div class="quick-amount">
    <button onclick="setQuickAmount(50000)">50K</button>
    <button onclick="setQuickAmount(100000)">100K</button>
    <button onclick="setQuickAmount(500000)">500K</button>
    <button onclick="setQuickAmount(1000000)">1TR</button>
  </div>

  <input id="note" placeholder="Ghi chú...">
  <input id="date" type="date">

  <select id="category">
    <option value="food">🍜 Ăn uống</option>
    <option value="transport">🚗 Di chuyển</option>
    <option value="entertainment">🎮 Giải trí</option>
    <option value="shopping">🛍️ Mua sắm</option>
    <option value="bill">💡 Hóa đơn</option>
    <option value="salary">💼 Lương</option>
    <option value="overtime">⏱️ Làm thêm</option>
  </select>

  <div class="row">
    <button class="income" onclick="addTransaction('income')">+ Thu</button>
    <button class="expense" onclick="addTransaction('expense')">- Chi</button>
  </div>
</div>

<!-- FILTER -->
<div class="card">
  <strong>📅 Lọc</strong>
  <input type="date" id="filterDate" onchange="render()">

  <div style="margin-top:6px;">
    <label><input type="checkbox" id="filterIncome" checked onchange="render()"> Thu</label>
    <label><input type="checkbox" id="filterExpense" checked onchange="render()"> Chi</label>
  </div>
</div>

<!-- NAV -->
<div class="card nav" onclick="showView('home')">🏠 Trang chính</div>
<div class="card nav" onclick="showView('budget')">📊 Thống kê</div>
<div class="card nav" onclick="showView('history')">📋 Giao dịch</div>
<div class="card nav" onclick="showView('profile')">👤 Cá nhân</div>

<!-- HOME -->
<div id="homeSection">
  <div class="card">
    <strong>📋 Giao dịch gần đây</strong>
    <div id="transactions"></div>
  </div>
</div>

<!-- BUDGET -->
<div id="budgetSection" style="display:none;">
  <div class="card">
    <strong>📊 Tổng quan</strong>
    <div id="budgetBox"></div>
    <canvas id="expenseChart"></canvas>
  </div>
</div>

<!-- HISTORY -->
<div id="historySection" style="display:none;">
  <div class="card">
    <strong>📜 Lịch sử</strong>
    <div id="historyList"></div>
  </div>
</div>

<!-- PROFILE (NEW) -->
<div id="profileSection" style="display:none;">
  <div class="card profile-card">
    <div id="profileBox"></div>
  </div>
</div>

<!-- RESET -->
<div class="card reset-card">
  <button onclick="resetMonth()">Reset tháng</button>
  <button onclick="resetApp()">Reset tất cả</button>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
